<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Live Scoreboard</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg:        #080c10;
    --surface:   #0e1318;
    --border:    #1c2530;
    --accent-nascar: #e8c84a;
    --accent-nfl:    #d94f3d;
    --text-primary:  #f0f4f8;
    --text-muted:    #5a6a7a;
    --text-dim:      #3a4a5a;
    --green:     #3ecf72;
    --live-pulse:#e8c84a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text-primary);
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* Subtle scanline texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 999;
  }

  /* ── HEADER ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 28px 14px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, #0d1219 0%, transparent 100%);
  }

  .logo {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 1.15rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .clock {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.05rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--text-muted);
  }

  /* ── LIVE BADGE ── */
  .live-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 3px;
  }
  .live-badge.nascar { background: rgba(232,200,74,0.15); color: var(--accent-nascar); border: 1px solid rgba(232,200,74,0.3); }
  .live-badge.nfl    { background: rgba(217,79,61,0.15);  color: var(--accent-nfl);    border: 1px solid rgba(217,79,61,0.3); }

  .live-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    animation: pulse 1.4s ease-in-out infinite;
  }
  .nascar .live-dot { background: var(--accent-nascar); }
  .nfl    .live-dot { background: var(--accent-nfl); }

  @keyframes pulse {
    0%,100% { opacity: 1; transform: scale(1); }
    50%      { opacity: 0.4; transform: scale(0.7); }
  }

  /* ── MAIN LAYOUT ── */
  main {
    padding: 24px 28px;
    display: flex;
    flex-direction: column;
    gap: 28px;
  }

  /* ── SECTION HEADER ── */
  .section-header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 14px;
  }
  .section-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--text-dim);
  }
  .section-line {
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ── NO EVENT CARD ── */
  .no-event {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text-dim);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    gap: 8px;
  }
  .no-event svg { opacity: 0.2; }

  /* ── NASCAR RACE CARD ── */
  .race-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }

  .race-card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    background: rgba(232,200,74,0.04);
  }

  .race-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.25rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    color: var(--text-primary);
    line-height: 1;
  }
  .race-meta {
    font-size: 0.78rem;
    color: var(--text-muted);
    margin-top: 3px;
    letter-spacing: 0.04em;
  }

  .race-status {
    text-align: right;
  }
  .lap-info {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.6rem;
    font-weight: 900;
    color: var(--accent-nascar);
    line-height: 1;
  }
  .lap-label {
    font-size: 0.7rem;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  /* Driver table */
  .driver-table {
    width: 100%;
    border-collapse: collapse;
  }

  .driver-row {
    display: grid;
    grid-template-columns: 36px 42px 1fr 90px 80px;
    align-items: center;
    padding: 9px 18px;
    border-bottom: 1px solid rgba(28,37,48,0.6);
    transition: background 0.15s;
    gap: 8px;
  }
  .driver-row:last-child { border-bottom: none; }
  .driver-row.leader { background: rgba(232,200,74,0.05); }

  .pos {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.1rem;
    font-weight: 900;
    color: var(--text-dim);
    text-align: center;
  }
  .driver-row.leader .pos { color: var(--accent-nascar); }

  .car-num {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.05rem;
    font-weight: 700;
    color: var(--text-muted);
    text-align: center;
    background: var(--border);
    border-radius: 3px;
    padding: 2px 0;
  }
  .driver-row.leader .car-num { background: rgba(232,200,74,0.2); color: var(--accent-nascar); }

  .driver-info .name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.05rem;
    font-weight: 600;
    letter-spacing: 0.02em;
    color: var(--text-primary);
    line-height: 1.1;
  }
  .driver-info .team {
    font-size: 0.72rem;
    color: var(--text-muted);
    letter-spacing: 0.03em;
  }

  .gap {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    color: var(--text-muted);
    text-align: right;
  }
  .driver-row.leader .gap { color: var(--green); }

  .driver-status {
    font-size: 0.72rem;
    text-align: right;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  /* ── NFL GAME CARD ── */
  .game-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    margin-bottom: 12px;
  }
  .game-card:last-child { margin-bottom: 0; }

  .game-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 18px;
    border-bottom: 1px solid var(--border);
    background: rgba(217,79,61,0.04);
  }
  .game-situation {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.78rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent-nfl);
  }
  .game-network {
    font-size: 0.72rem;
    color: var(--text-dim);
    letter-spacing: 0.06em;
  }

  .game-score-row {
    display: flex;
    align-items: stretch;
  }

  .team-block {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 16px 20px;
  }
  .team-block.away { border-right: 1px solid var(--border); }

  .team-abbr {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 2.2rem;
    font-weight: 900;
    letter-spacing: 0.02em;
    color: var(--text-primary);
    line-height: 1;
    min-width: 64px;
  }

  .team-details .team-full {
    font-size: 0.78rem;
    color: var(--text-muted);
    letter-spacing: 0.04em;
    margin-bottom: 3px;
  }
  .team-details .record {
    font-size: 0.7rem;
    color: var(--text-dim);
    letter-spacing: 0.04em;
  }

  .score-display {
    margin-left: auto;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 3rem;
    font-weight: 900;
    color: var(--text-primary);
    line-height: 1;
  }
  .score-display.leading { color: var(--accent-nfl); }

  .possession-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent-nfl);
    margin-left: auto;
    margin-right: 4px;
    align-self: center;
    animation: pulse 1s ease-in-out infinite;
  }

  .game-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 18px;
    border-top: 1px solid var(--border);
    background: rgba(0,0,0,0.2);
  }
  .down-distance {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.88rem;
    font-weight: 600;
    color: var(--text-muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .field-pos {
    font-size: 0.78rem;
    color: var(--text-dim);
    letter-spacing: 0.04em;
  }

  /* ── UPCOMING ── */
  .upcoming-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 10px;
  }
  .upcoming-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 12px 14px;
  }
  .upcoming-sport {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 5px;
  }
  .upcoming-event {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    color: var(--text-primary);
    line-height: 1.2;
    margin-bottom: 4px;
  }
  .upcoming-time {
    font-size: 0.75rem;
    color: var(--text-muted);
  }

  /* ── FOOTER ── */
  footer {
    padding: 10px 28px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .refresh-info {
    font-size: 0.68rem;
    color: var(--text-dim);
    letter-spacing: 0.06em;
  }
  .error-msg {
    font-size: 0.7rem;
    color: #c0392b;
    letter-spacing: 0.04em;
  }

  /* ── LOADING ── */
  .loading {
    display: flex;
    align-items: center;
    gap: 10px;
    color: var(--text-dim);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.9rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 30px 0;
  }
  .spinner {
    width: 16px; height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--text-muted);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* fade-in for new content */
  .fade-in { animation: fadeIn 0.4s ease forwards; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
</style>
</head>
<body>

<header>
  <div class="logo">&#9632; Scoreboard</div>
  <div class="clock" id="clock">--:-- --</div>
</header>

<main id="main">
  <div class="loading"><div class="spinner"></div> Loading live data…</div>
</main>

<footer>
  <div class="refresh-info" id="refresh-info">Refreshes every 45 seconds</div>
  <div class="error-msg" id="error-msg"></div>
</footer>

<script>
// ─────────────────────────────────────────────
//  CONFIG
// ─────────────────────────────────────────────
const REFRESH_MS = 45000; // 45 seconds

// ESPN API endpoints (unofficial, no key required)
const ESPN = {
  // NASCAR series
  cup:    'https://site.api.espn.com/apis/site/v2/sports/racing/nascar-cup/scoreboard',
  xfin:   'https://site.api.espn.com/apis/site/v2/sports/racing/nascar-xfinity/scoreboard',
  truck:  'https://site.api.espn.com/apis/site/v2/sports/racing/nascar-truck/scoreboard',
  // NFL
  nfl:    'https://site.api.espn.com/apis/site/v2/sports/football/nfl/scoreboard',
};

// ─────────────────────────────────────────────
//  CLOCK
// ─────────────────────────────────────────────
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent = now.toLocaleTimeString('en-US', {
    hour: 'numeric', minute: '2-digit', hour12: true
  });
}
setInterval(updateClock, 1000);
updateClock();

// ─────────────────────────────────────────────
//  FETCH helper
// ─────────────────────────────────────────────
async function fetchJSON(url) {
  // Use a CORS proxy for GitHub Pages since ESPN blocks direct browser requests
  const proxy = 'https://corsproxy.io/?';
  const res = await fetch(proxy + encodeURIComponent(url));
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

// ─────────────────────────────────────────────
//  NASCAR HELPERS
// ─────────────────────────────────────────────
function isNascarLive(event) {
  const s = (event.status?.type?.name || '').toLowerCase();
  return s.includes('in') || s === 'in_progress' || s.includes('live');
}

function nascarSeriesLabel(slug) {
  if (slug.includes('truck')) return 'Craftsman Truck Series';
  if (slug.includes('xfinity')) return "Xfinity Series";
  return 'Cup Series';
}

function renderNascarCard(event, seriesSlug) {
  const comp   = event.competitions?.[0];
  const status = event.status || {};
  const typeName = (status.type?.name || '').toLowerCase();
  const isLive = isNascarLive(event);

  const raceName  = event.name || event.shortName || 'NASCAR Race';
  const venueName = comp?.venue?.fullName || '';
  const lapDetail = status.type?.detail || '';

  // Competitors / leaderboard
  const competitors = (comp?.competitors || [])
    .sort((a, b) => parseInt(a.order || 99) - parseInt(b.order || 99))
    .slice(0, 10);

  const rows = competitors.map((c, i) => {
    const isLeader = i === 0;
    const driver = c.athlete || {};
    const name   = driver.displayName || driver.fullName || `Car #${c.id}`;
    const carNum = c.vehicle?.number || c.id || '?';
    const team   = c.team?.shortDisplayName || c.team?.name || '';
    const gap    = isLeader ? 'LEADER' : (c.statistics?.find(s => s.name === 'gapToLeader')?.displayValue || c.gap || '--');
    const pitStatus = c.onTrack === false ? 'PIT' : '';

    return `
      <div class="driver-row${isLeader ? ' leader' : ''}">
        <div class="pos">${i + 1}</div>
        <div class="car-num">${carNum}</div>
        <div class="driver-info">
          <div class="name">${name}</div>
          <div class="team">${team}</div>
        </div>
        <div class="gap">${gap}</div>
        <div class="driver-status">${pitStatus}</div>
      </div>`;
  }).join('');

  return `
    <div class="race-card fade-in">
      <div class="race-card-header">
        <div>
          <div class="race-name">${raceName}</div>
          <div class="race-meta">${nascarSeriesLabel(seriesSlug)}${venueName ? ' &nbsp;·&nbsp; ' + venueName : ''}</div>
        </div>
        <div class="race-status">
          ${isLive
            ? `<div class="lap-info">${lapDetail || 'LIVE'}</div><div class="lap-label">Status</div>`
            : `<div class="race-meta">${status.type?.description || 'Scheduled'}</div>`
          }
        </div>
      </div>
      <div class="driver-table">
        ${rows || '<div class="no-event">No leaderboard data available</div>'}
      </div>
    </div>`;
}

// ─────────────────────────────────────────────
//  NFL HELPERS
// ─────────────────────────────────────────────
function isNFLLive(event) {
  const s = (event.status?.type?.name || '').toLowerCase();
  return s === 'in_progress' || s.includes('live') || s.includes('in');
}

function renderNFLCard(event) {
  const comp = event.competitions?.[0];
  const status = event.status || {};
  const isLive = isNFLLive(event);

  const detail = status.type?.detail || '';
  const situation = comp?.situation || {};
  const downDist = situation.downDistanceText || '';
  const fieldPos  = situation.possessionText || '';

  const teams = comp?.competitors || [];
  const home  = teams.find(t => t.homeAway === 'home') || teams[1] || {};
  const away  = teams.find(t => t.homeAway === 'away') || teams[0] || {};

  const homeScore = parseInt(home.score || 0);
  const awayScore = parseInt(away.score || 0);
  const homeLeads = homeScore > awayScore;
  const awayLeads = awayScore > homeScore;

  const homePoss = situation.possessionId === (home.team?.id || home.id);
  const awayPoss = situation.possessionId === (away.team?.id || away.id);

  const network = comp?.broadcasts?.map(b => b.names?.join('/')).filter(Boolean).join(', ') || '';

  function teamBlock(t, score, isHome, isLeading, hasPossession) {
    const abbr    = t.team?.abbreviation || t.team?.shortDisplayName || t.abbreviation || '???';
    const full    = t.team?.displayName   || t.team?.name || '';
    const record  = t.records?.[0]?.summary || '';
    return `
      <div class="team-block ${isHome ? 'home' : 'away'}">
        <div>
          <div class="team-abbr">${abbr}</div>
          <div class="team-details">
            <div class="team-full">${full}</div>
            <div class="record">${record}</div>
          </div>
        </div>
        ${hasPossession && isLive ? '<div class="possession-dot"></div>' : ''}
        <div class="score-display${isLeading ? ' leading' : ''}">${score}</div>
      </div>`;
  }

  return `
    <div class="game-card fade-in">
      <div class="game-header">
        <div class="game-situation">${isLive ? detail : (status.type?.description || 'Scheduled')}</div>
        ${network ? `<div class="game-network">${network}</div>` : ''}
        <span class="live-badge nfl"><span class="live-dot"></span>${isLive ? 'LIVE' : 'NFL'}</span>
      </div>
      <div class="game-score-row">
        ${teamBlock(away, awayScore, false, awayLeads, awayPoss)}
        ${teamBlock(home, homeScore, true,  homeLeads, homePoss)}
      </div>
      ${isLive && (downDist || fieldPos) ? `
      <div class="game-footer">
        <div class="down-distance">${downDist}</div>
        <div class="field-pos">${fieldPos}</div>
      </div>` : ''}
    </div>`;
}

// ─────────────────────────────────────────────
//  UPCOMING card (non-live events)
// ─────────────────────────────────────────────
function renderUpcoming(events, sport) {
  return events.map(e => {
    const dateStr = e.date ? new Date(e.date).toLocaleString('en-US', {
      weekday: 'short', month: 'short', day: 'numeric',
      hour: 'numeric', minute: '2-digit', hour12: true
    }) : '';
    return `
      <div class="upcoming-card">
        <div class="upcoming-sport">${sport}</div>
        <div class="upcoming-event">${e.name || e.shortName || 'Event'}</div>
        ${dateStr ? `<div class="upcoming-time">${dateStr}</div>` : ''}
      </div>`;
  }).join('');
}

// ─────────────────────────────────────────────
//  SECTION wrapper
// ─────────────────────────────────────────────
function section(title, accent, content) {
  return `
    <section>
      <div class="section-header">
        <span class="section-title">${title}</span>
        <div class="section-line"></div>
        <span class="live-badge ${accent}"><span class="live-dot"></span>LIVE</span>
      </div>
      ${content}
    </section>`;
}

function sectionUpcoming(title, content) {
  return `
    <section>
      <div class="section-header">
        <span class="section-title">${title}</span>
        <div class="section-line"></div>
      </div>
      ${content}
    </section>`;
}

// ─────────────────────────────────────────────
//  MAIN RENDER
// ─────────────────────────────────────────────
async function render() {
  document.getElementById('error-msg').textContent = '';

  try {
    // Fetch all simultaneously
    const [cupData, xfinData, truckData, nflData] = await Promise.allSettled([
      fetchJSON(ESPN.cup),
      fetchJSON(ESPN.xfin),
      fetchJSON(ESPN.truck),
      fetchJSON(ESPN.nfl),
    ]);

    const main = document.getElementById('main');
    let html = '';

    // ── NASCAR ──────────────────────────────────
    const nascarSources = [
      { result: cupData,   slug: 'cup',   label: 'Cup Series' },
      { result: xfinData,  slug: 'xfinity', label: 'Xfinity Series' },
      { result: truckData, slug: 'truck', label: 'Craftsman Truck Series' },
    ];

    let liveNascarHTML   = '';
    let upcomingNascarCards = [];

    for (const src of nascarSources) {
      if (src.result.status !== 'fulfilled') continue;
      const events = src.result.value?.events || [];
      for (const ev of events) {
        if (isNascarLive(ev)) {
          liveNascarHTML += renderNascarCard(ev, src.slug);
        } else {
          upcomingNascarCards.push({ ev, slug: src.slug, label: src.label });
        }
      }
    }

    if (liveNascarHTML) {
      html += section('NASCAR — Live Race', 'nascar', liveNascarHTML);
    } else if (upcomingNascarCards.length) {
      const upHTML = `<div class="upcoming-grid">` +
        upcomingNascarCards.slice(0, 6).map(x =>
          renderUpcoming([x.ev], x.label)
        ).join('') +
        `</div>`;
      html += sectionUpcoming('NASCAR — Upcoming', upHTML);
    }

    // ── NFL ─────────────────────────────────────
    let liveNFLHTML      = '';
    let upcomingNFLCards = [];

    if (nflData.status === 'fulfilled') {
      const events = nflData.value?.events || [];
      for (const ev of events) {
        if (isNFLLive(ev)) {
          liveNFLHTML += renderNFLCard(ev);
        } else {
          upcomingNFLCards.push(ev);
        }
      }
    }

    if (liveNFLHTML) {
      html += section('NFL Football — Live', 'nfl', liveNFLHTML);
    } else if (upcomingNFLCards.length) {
      const upHTML = `<div class="upcoming-grid">` +
        renderUpcoming(upcomingNFLCards.slice(0, 6), 'NFL Football') +
        `</div>`;
      html += sectionUpcoming('NFL Football — Upcoming', upHTML);
    }

    // ── NOTHING? ────────────────────────────────
    if (!html) {
      html = `
        <div class="no-event">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/>
          </svg>
          No live events right now
        </div>`;
    }

    main.innerHTML = html;

    // Update refresh timestamp
    const now = new Date().toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
    document.getElementById('refresh-info').textContent = `Last updated ${now} · Refreshes every 45s`;

  } catch (err) {
    document.getElementById('error-msg').textContent = `Error: ${err.message}`;
    console.error(err);
  }
}

// ─────────────────────────────────────────────
//  BOOT
// ─────────────────────────────────────────────
render();
setInterval(render, REFRESH_MS);
</script>
</body>
</html>
